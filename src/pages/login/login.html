<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">]
    <link rel="stylesheet" href="../../global.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=local_activity" />
    <title>TicketFlow</title>
</head>

<body>
    <header class="header">
        <div class="logo">
            <span class="material-symbols-outlined">
                local_activity
            </span>
            </span>
            <h1 class="text-logo">TicketFlow</h1>
        </div>
    </header>

    <main class="container">
        <div class="login-header">
            <h1>Bem-vindo</h1>
            <p>Entre para ter acesso aos seus ingressos e acompnhar eventos</p>
        </div>

        <div class="login-box">
            <form action="#" method="post">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" name="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" name="password" id="password" placeholder="*********" required>
                </div>

                <div class="forgot-password">
                    <a href="#">Esqueci minha senha</a>
                </div>

                <button type="submit" class="btn-login">Entrar</button>
            </form>
        </div>

        <div class="register-field">
            Não possui conta? <a href="../register/register.html">Criar conta</a>
        </div>
    </main>
</body>
<script type="module" src="./login.js"></script>

</html>
