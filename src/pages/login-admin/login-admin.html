<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../global.css">
    <link rel="stylesheet" href="login-admin.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <title>TicketFlow</title>
</head>

<body>
    <header class="header">
        <div class="logo">
            <span class="material-symbols-outlined">
                local_activity
            </span>
            </span>
            <h1 class="text-logo">TicketFlow</h1>
        </div>
    </header>

    <main class="container">
        <div class="admin-header">
            <h1>Acesso Administrador</h1>
            <p>Faça o gerenciamento de eventos e ingressos</p>
        </div>

        <div class="admin-box">
            <form action="#" method="post">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" name="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" name="password" id="password" placeholder="*********" required>
                </div>

                <button type="submit" class="btn-admin">Entrar</button>
            </form>
        </div>

        <div class="go-back">
            <span class="material-symbols-outlined">
                arrow_left_alt
            </span>
            <a href="#">Retornar para home</a>
        </div>
    </main>
</body>

</html>
