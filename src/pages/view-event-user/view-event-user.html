<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../global.css">
    <link rel="stylesheet" href="./view-event-user.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Visualizar Evento - TicketFlow</title>
</head>
<body>
    <header class="header">
        <div class="logo">
            <span class="material-symbols-outlined">local_activity</span>
            <h1 class="text-logo">TicketFlow</h1>
        </div>
        <nav class="header-nav">
            <a href="../login/login.html" class="nav-link">Entrar</a>
            <a href="../register/register.html" class="btn-register">Cadastrar</a>
        </nav>
    </header>

    <main class="main-content">
        <a href="../user-home/user-home.html" class="back-link">← Voltar para eventos</a>

        <div class="event-layout">
            <div class="event-details">
                <div class="hero-banner">
                    <img id="event-image" src="" alt="Capa do evento">
                    <div class="hero-overlay">
                        <span id="event-category" class="category-badge"></span>
                        <h1 id="event-title"></h1>
                    </div>
                </div>

                <div class="section-sobre">
                    <h2>Sobre o evento</h2>
                    <p id="event-description"></p>
                </div>

                <div class="info-grid">
                    <div class="info-box">
                        <label>DATA</label>
                        <p id="event-date"></p>
                    </div>
                    <div class="info-box">
                        <label>HORÁRIO</label>
                        <p id="event-time"></p>
                    </div>
                    <div class="info-box">
                        <label>CAPACIDADE</label>
                        <p id="event-capacity"></p>
                    </div>
                    <div class="info-box full-width">
                        <label>LOCAL</label>
                        <p id="event-local"></p>
                    </div>
                </div>
            </div>

            <aside class="event-sidebar">
                <div class="ticket-panel">
                    <p class="panel-subtitle">INGRESSOS A PARTIR DE</p>
                    <div class="price-info">
                        <h2 id="event-price">R$ 0,00</h2>
                        <span class="ticket-types">Tipos de ingresso disponíveis</span>
                    </div>
                    
                    <button id="btn-buy" class="btn-buy">Adquirir ingresso</button>
                    
                    <p class="security-note">Pagamento seguro via Pix. Confirmação instantânea.</p>
                </div>
            </aside>
        </div>
    </main>

    <script type="module" src="./view-event-user.js"></script>
</body>
</html>
