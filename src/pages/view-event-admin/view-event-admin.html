<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../global.css">
    <link rel="stylesheet" href="./view-event-admin.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Visualizar Evento - TicketFlow</title>
</head>
<body>
    <header class="header">
        <div class="logo">
            <span class="material-symbols-outlined">local_activity</span>
            <h1 class="text-logo">TicketFlow <span class="admin-text">/ Admin</span></h1>
        </div>
        <nav class="header-nav">
            <a href="../home-admin/home-admin.html">Eventos</a>
            <a href="#">Sair</a>
        </nav>
    </header>

    <main class="main-content">
        <a href="../home-admin/home-admin.html" class="back-link">← Voltar para eventos</a>

        <div class="event-layout">
            <div class="event-details">
                <div class="hero-banner">
                    <img id="event-image" src="" alt="Capa do evento">
                    <div class="hero-overlay">
                        <span id="event-category" class="category-badge"></span>
                        <h1 id="event-title"></h1>
                    </div>
                </div>

                <div class="section-sobre">
                    <h2>Sobre o evento</h2>
                    <p id="event-description"></p>
                </div>

                <div class="info-grid">
                    <div class="info-box">
                        <label>DATA</label>
                        <p id="event-date"></p>
                    </div>
                    <div class="info-box">
                        <label>HORÁRIO</label>
                        <p id="event-time"></p>
                    </div>
                    <div class="info-box">
                        <label>CAPACIDADE</label>
                        <p id="event-capacity"></p>
                    </div>
                    <div class="info-box full-width">
                        <label>LOCAL</label>
                        <p id="event-local"></p>
                    </div>
                </div>
            </div>

            <aside class="event-sidebar">
                <div class="admin-panel">
                    <p class="panel-subtitle">GERENCIAR EVENTO</p>
                    <div class="price-info">
                        <span>Preço do ingresso</span>
                        <h2 id="event-price">R$ 0,00</h2>
                    </div>
                    
                    <div class="panel-actions">
                        <button id="btn-edit" class="btn-edit">Editar evento</button>
                        <button id="btn-delete" class="btn-delete">Excluir evento</button>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <script type="module" src="./view-event-admin.js"></script>
</body>
</html>
