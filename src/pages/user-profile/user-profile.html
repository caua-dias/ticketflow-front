<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../global.css">
    <link rel="stylesheet" href="./user-profile.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Meu Perfil - TicketFlow</title>
</head>
<body>
    <header class="header">
        <div class="logo">
            <span class="material-symbols-outlined">local_activity</span>
            <h1 class="text-logo">TicketFlow</h1>
        </div>
        <nav class="header-nav">
            <a href="../user-home/user-home.html" class="nav-link">Página Inicial</a>
            <a href="#" id="btn-logout" class="nav-link" style="color: #FF4D4D;">Sair</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="profile-header">
            <span class="subtitle">ÁREA DO CLIENTE</span>
            <h1>Meu Perfil</h1>
            <p>Gerencie suas informações e visualize seus ingressos.</p>
        </div>

        <div class="profile-layout">
            <section class="profile-section">
                <h2>Meus Dados</h2>
                <form id="form-profile" class="form-container">
                    <div class="form-group">
                        <label for="name">NOME COMPLETO</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">E-MAIL (Não alterável)</label>
                        <input type="email" id="email" disabled>
                    </div>
                    <button type="submit" class="btn-submit" id="btn-update">Atualizar Dados</button>
                </form>
            </section>

            <section class="profile-section">
                <h2>Meus Ingressos</h2>
                <div id="tickets-container" class="tickets-grid">
                    </div>
            </section>
        </div>
    </main>

    <script type="module" src="./user-profile.js"></script>
</body>
</html>
