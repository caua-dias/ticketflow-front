<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../global.css">
    <link rel="stylesheet" href="register.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=local_activity" />
    <title>TicketFlow</title>
</head>

<body>
    <header class="header">
        <div class="logo">
            <span class="material-symbols-outlined">
                local_activity
            </span>
            </span>
            <h1 class="text-logo">TicketFlow</h1>
        </div>
    </header>

    <main class="container">
        <div class="register-header">
            <h1>Crie sua conta</h1>
            <p>Registra-se no nosso sistema para obter os ingressos de eventos!</p>
        </div>

        <div class="register-box">
            <form action="#" method="post">
                <div class="input-group">
                    <label for="name">Nome Completo</label>
                    <input type="text" name="name" id="name" placeholder="Joseph Henrique Naves" required>
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" name="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="input-group">
                    <label for="cpf">CPF</label>
                    <input type="tel" name="cpf" id="cpf" placeholder="000.000.000-00" required>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" name="password" id="password" placeholder="Mínimo 8 caracteres" required>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirme sua senha</label>
                    <input type="password" name="confirm-password" id="confirm-password" placeholder="********"
                        required>
                </div>

                <div class="input-group">
                    <label>Tipo de conta</label>

                    <div class="radio-access">
                        <div>
                            <input type="radio" id="user" name="role" value="0" checked>
                            <label for="user">Cliente</label>
                        </div>

                        <div>
                            <input type="radio" id="admin" name="role" value="1">
                            <label for="admin">Organizador</label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-register">Criar conta</button>

                <p class="terms">
                    Ao continuar, você concorda com nossos <a href="#">Termos e Política de Privacidade</a>
                </p>
            </form>
        </div>

        <div class="login-field">
            Já possui conta? <a href="../login/login.html">Entrar</a>
        </div>
    </main>
</body>

<script type="module" src="./register.js"></script>
</html>
