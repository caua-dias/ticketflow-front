<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../global.css">
    <link rel="stylesheet" href="./user-home.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <title>TicketFlow - Ingressos Digitais</title>
</head>

<body>
    <header class="header">
        <div class="logo">
            <span class="material-symbols-outlined">local_activity</span>
            <h1 class="text-logo">TicketFlow</h1>
        </div>
        <nav class="header-nav">
            <a href="../user-profile/user-profile.html" class="nav-link profile-link">
                <span class="material-symbols-outlined">account_circle</span>
                Meu Perfil
            </a>
            <a href="#" id="btn-logout" class="nav-link" style="color: #FF4D4D;">Sair</a>
        </nav>
    </header>

    <main class="main-content">
        <section class="hero-section">
            <span class="welcome-text">BEM-VINDO</span>
            <h1 class="hero-title">Os melhores eventos<br>do Brasil, num só lugar.</h1>
            <p class="hero-subtitle">Explore eventos em destaque e garanta seu lugar em segundos via Pix.</p>
        </section>

        <section class="events-section">
            <div class="events-header">
                <h2>Eventos em destaque</h2>
                <div class="filters">
                    <button class="filter-btn active">Todos</button>
                    <button class="filter-btn">Concertos</button>
                    <button class="filter-btn">Tech</button>
                    <button class="filter-btn">Esportes</button>
                    <button class="filter-btn">Arte</button>
                </div>
            </div>

            <div id="user-events" class="events-grid">
                </div>
        </section>
    </main>

    <footer class="footer">
        <p>© 2026 TicketFlow Systems. Ingressos digitais redefinidos.</p>
        <div class="footer-links">
            <a href="#">Termos</a>
            <a href="#">Privacidade</a>
            <a href="#">Suporte</a>
        </div>
    </footer>

    <script type="module" src="./user-home.js"></script>
</body>

</html>
