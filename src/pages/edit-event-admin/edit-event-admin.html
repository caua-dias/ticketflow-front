<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../global.css">
    <link rel="stylesheet" href="./edit-event-admin.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Editar Evento - TicketFlow</title>
</head>

<body>
    <header class="header">
        <div class="logo">
            <span class="material-symbols-outlined">local_activity</span>
            <h1 class="text-logo">TicketFlow <span class="admin-text">/ Admin</span></h1>
        </div>
        <nav class="header-nav">
            <a href="../home-admin/home-admin.html">Eventos</a>
            <a href="#">Sair</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="page-header">
            <a href="../home-admin/home-admin.html" class="back-link">← Voltar para eventos</a>
            <span class="subtitle">EDITAR EVENTO</span>
            <h1>Atualizar dados</h1>
            <p>Modifique as informações do evento abaixo.</p>
        </div>

        <form id="form-edit-event" class="form-container">

            <div class="form-row-2">
                <div class="form-group">
                    <label for="nome">NOME DO EVENTO</label>
                    <input type="text" id="nome" required>
                </div>
                <div class="form-group">
                    <label for="tipo">TIPO DE EVENTO</label>
                    <select id="tipo" required>
                        <option value="Música">Música</option>
                        <option value="Tecnologia">Tecnologia</option>
                        <option value="Arte">Arte</option>
                        <option value="Esporte">Esporte</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="descricao">DESCRIÇÃO</label>
                <textarea id="descricao" rows="4" placeholder="Conte aos participantes o que esperar..."></textarea>
            </div>
            <div class="form-row-3">
                <div class="form-group">
                    <label for="data">DATA</label>
                    <input type="date" id="data" required>
                </div>
                <div class="form-group">
                    <label for="horario">HORÁRIO</label>
                    <input type="time" id="horario" required>
                </div>
                <div class="form-group">
                    <label for="capacidade">CAPACIDADE</label>
                    <input type="number" id="capacidade" placeholder="500" required>
                </div>
            </div>
            <div class="form-row-2">
                <div class="form-group">
                    <label for="preco">PREÇO DO INGRESSO (R$)</label>
                    <input type="text" id="preco" placeholder="89,90">
                </div>
                <div class="form-group">
                    <label for="local">LOCAL</label>
                    <input type="text" id="local" placeholder="Cidade, espaço, endereço" required>
                </div>
            </div>
            <div class="form-actions">
                <button type="button" class="btn-cancel" onclick="history.back()">Cancelar</button>
                <button type="submit" class="btn-submit">Salvar alterações</button>
            </div>

        </form>
    </main>

    <script type="module" src="./edit-event-admin.js"></script>
</body>

</html>
